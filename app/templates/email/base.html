<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        /* Reset */
        body, table, td { margin: 0; padding: 0; }
        img { border: 0; display: block; max-width: 100%; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333333; background: #f4f0eb; }
        
        /* Container */
        .email-wrapper { width: 100%; background: #f4f0eb; padding: 40px 16px; }
        .email-container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        
        /* Header */
        .email-header { background: linear-gradient(135deg, #1A4D2E 0%, #0F3320 100%); padding: 36px 40px; text-align: center; }
        .email-header h1 { color: #D4AF37; font-size: 28px; margin: 0 0 4px; font-weight: 700; letter-spacing: 0.5px; }
        .email-header .subtitle { color: rgba(255,255,255,0.75); font-size: 14px; margin: 0; }
        .email-header .brand { color: #D4AF37; font-size: 16px; font-weight: 600; display: inline-block; border: 2px solid rgba(212,175,55,0.4); border-radius: 50%; width: 48px; height: 48px; line-height: 44px; margin-bottom: 12px; }
        
        /* Body */
        .email-body { padding: 36px 40px; }
        .email-body p { font-size: 15px; line-height: 1.65; margin: 0 0 16px; color: #4B5563; }
        .email-body .greeting { font-size: 17px; color: #1A4D2E; font-weight: 600; margin-bottom: 20px; }
        
        /* Detail Row */
        .detail-table { width: 100%; border-collapse: collapse; margin: 24px 0; }
        .detail-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #F0ECD7; }
        .detail-table .label { font-weight: 600; color: #1A4D2E; width: 40%; }
        .detail-table .value { color: #374151; text-align: right; }
        .detail-table .highlight { color: #D4AF37; font-weight: 700; font-size: 18px; }
        
        /* CTA Button */
        .cta-section { text-align: center; padding: 24px 0; }
        .cta-btn { display: inline-block; background: linear-gradient(135deg, #D4AF37, #A08020); color: #ffffff; padding: 14px 36px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; letter-spacing: 0.3px; }
        
        /* Divider */
        .divider { height: 1px; background: linear-gradient(to right, transparent, #D4AF37, transparent); margin: 24px 0; }
        
        /* Info Box */
        .info-box { background: #F5ECD7; border-radius: 8px; padding: 20px; margin: 20px 0; border-left: 4px solid #D4AF37; }
        .info-box h3 { color: #1A4D2E; font-size: 14px; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.08em; }
        .info-box p { font-size: 13px; margin: 0; color: #4B5563; line-height: 1.5; }
        
        /* Footer */
        .email-footer { background: #1A4D2E; padding: 28px 40px; text-align: center; }
        .email-footer p { color: rgba(255,255,255,0.6); font-size: 12px; margin: 0 0 6px; line-height: 1.5; }
        .email-footer a { color: #D4AF37; text-decoration: none; }
        .email-footer .socials { margin: 12px 0; }
        .email-footer .socials a { display: inline-block; margin: 0 8px; color: #D4AF37; font-size: 13px; }
        
        /* Responsive */
        @media only screen and (max-width: 640px) {
            .email-body { padding: 24px 20px; }
            .email-header { padding: 28px 20px; }
            .email-footer { padding: 20px; }
            .email-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <table class="email-container" role="presentation" cellpadding="0" cellspacing="0" width="600" align="center">
            <!-- Header -->
            <tr>
                <td class="email-header">
                    <div class="brand">S</div>
                    <h1>{{TITLE}}</h1>
                    <p class="subtitle">{{SUBTITLE}}</p>
                </td>
            </tr>
            
            <!-- Body -->
            <tr>
                <td class="email-body">
                    {{CONTENT}}
                </td>
            </tr>
            
            <!-- Footer -->
            <tr>
                <td class="email-footer">
                    <div class="socials">
                        <a href="#">Facebook</a> &middot;
                        <a href="#">Instagram</a> &middot;
                        <a href="#">Twitter</a>
                    </div>
                    <p>Sidai Resort Resort</p>
                    <p>Narok County, Kenya &middot; +254 720 000 000</p>
                    <p style="margin-top:12px;">&copy; {{YEAR}} Sidai Resort. All rights reserved.</p>
                    <p style="margin-top:8px;"><a href="{{UNSUBSCRIBE_URL}}">Unsubscribe</a></p>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
