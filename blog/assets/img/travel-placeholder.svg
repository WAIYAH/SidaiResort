<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Loita Hills Travel Placeholder</title>
  <desc id="desc">Stylized hills and sky representing Narok travel scenes</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A4D2E"/>
      <stop offset="100%" stop-color="#0f2d1b"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f6c49"/>
      <stop offset="100%" stop-color="#1A4D2E"/>
    </linearGradient>
    <linearGradient id="hill2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f815b"/>
      <stop offset="100%" stop-color="#224f34"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#sky)"/>
  <circle cx="950" cy="130" r="80" fill="#D4AF37" opacity="0.88"/>
  <path d="M0 500 Q220 420 420 500 T840 500 T1200 480 V700 H0 Z" fill="url(#hill1)"/>
  <path d="M0 560 Q280 470 520 560 T980 540 T1200 560 V700 H0 Z" fill="url(#hill2)" opacity="0.95"/>
  <text x="70" y="610" fill="#F5ECD7" font-family="Georgia, serif" font-size="52">Narok Travel Guide</text>
  <text x="72" y="655" fill="#F5ECD7" font-family="Arial, sans-serif" font-size="28">Sidai Resort feature image slot</text>
</svg>
